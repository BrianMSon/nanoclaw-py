<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanoclaw</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
#auth { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; }
#auth input { padding: 10px 16px; width: 280px; border: 1px solid #444; border-radius: 6px; background: #16213e; color: #e0e0e0; font-size: 14px; }
#auth button { padding: 10px 24px; border: none; border-radius: 6px; background: #0f3460; color: #e0e0e0; cursor: pointer; font-size: 14px; }
#auth button:hover { background: #1a5276; }
#auth .error { color: #e74c3c; font-size: 13px; min-height: 20px; }
#chat { display: none; flex-direction: column; height: 100vh; }
#chat-wrapper { display: flex; flex: 1; overflow: hidden; }
#chat-main { display: flex; flex-direction: column; flex: 1; min-width: 280px; max-width: 100%; }
#sidebar { width: 0; min-width: 0; background: #1a1a2e; display: flex; flex-direction: column; overflow: hidden; }
#sidebar h3 { padding: 10px 12px 8px; font-size: 13px; font-weight: 600; color: #aaa; border-bottom: 1px solid #333; flex-shrink: 0; }
#history-list { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
#history-list::-webkit-scrollbar { width: 5px; }
#history-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
.history-item { padding: 7px 10px; font-size: 12px; color: #ccc; background: #16213e; border-radius: 6px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background 0.15s; }
.history-item:hover { background: #0f3460; color: #fff; }
#split-bar { width: 8px; background: #2a2a3e; cursor: col-resize; flex-shrink: 0; transition: background 0.2s, width 0.2s; position: relative; display: flex; align-items: center; justify-content: center; }
#split-bar::after { content: ''; display: block; width: 4px; height: 24px; background: rgba(255,255,255,0.12); border-radius: 3px; transition: background 0.2s, height 0.2s; }
#split-bar:hover, #split-bar.dragging { background: #0f3460; width: 10px; }
#split-bar:hover::after, #split-bar.dragging::after { background: rgba(255,255,255,0.35); height: 36px; }
#header { padding: 10px 16px; background: #16213e; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
#header h1 { font-size: 16px; font-weight: 600; }
#header .actions { display: flex; gap: 8px; }
#header button { padding: 4px 12px; border: 1px solid #444; border-radius: 4px; background: transparent; color: #aaa; cursor: pointer; font-size: 12px; }
#header button:hover { background: #0f3460; color: #e0e0e0; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; line-height: 1.5; font-size: 14px; word-break: break-word; position: relative; }
.msg.user { white-space: pre-wrap; }
.msg.bot p, .msg.push p { margin: 0 0 8px 0; } .msg.bot p:last-child, .msg.push p:last-child { margin-bottom: 0; }
.msg.bot pre, .msg.push pre { background: #0d1117; border-radius: 6px; padding: 10px; overflow-x: auto; margin: 8px 0; font-size: 13px; }
.msg.bot code, .msg.push code { font-family: 'Consolas', 'Monaco', monospace; font-size: 13px; }
.msg.bot :not(pre)>code, .msg.push :not(pre)>code { background: #2a2a4a; padding: 1px 5px; border-radius: 3px; }
.msg.bot ul, .msg.push ul { margin: 4px 0 4px 20px; } .msg.bot ol, .msg.push ol { margin: 4px 0 4px 20px; }
.msg.bot blockquote, .msg.push blockquote { border-left: 3px solid #555; padding-left: 10px; margin: 6px 0; color: #aaa; }
.msg.bot a, .msg.push a { color: #5dade2; text-decoration: none; } .msg.bot a:hover, .msg.push a:hover { text-decoration: underline; }
.msg.bot table, .msg.push table { border-collapse: collapse; margin: 8px 0; font-size: 13px; }
.msg.bot th, .msg.push th { background: #0d1117; padding: 5px 10px; border: 1px solid #444; text-align: left; }
.msg.bot td, .msg.push td { padding: 5px 10px; border: 1px solid #333; }
.msg.bot h1,.msg.bot h2,.msg.bot h3,.msg.push h1,.msg.push h2,.msg.push h3 { margin: 10px 0 4px; font-size: 15px; }
.msg .time { display: block; font-size: 10px; color: #888; margin-top: 4px; text-align: right; }
.msg.user { align-self: flex-end; background: #0f3460; }
.msg.bot { align-self: flex-start; background: #16213e; border: 1px solid #333; }
.msg.push { align-self: flex-start; background: #1a3a2a; border: 1px solid #2d5a3d; }
.msg.error { align-self: center; background: #3a1a1a; border: 1px solid #5a2d2d; color: #e74c3c; }
.msg.system { align-self: center; background: transparent; color: #666; font-size: 12px; }
#typing { padding: 4px 16px; font-size: 12px; color: #f5c542; min-height: 22px; }
.msg.disconnected { align-self: center; background: transparent; color: #e74c3c; font-size: 12px; font-weight: bold; }
.msg.disconnected { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.reconnect-btn { padding: 6px 16px; border: 1px solid #e74c3c; border-radius: 4px; background: transparent; color: #e74c3c; cursor: pointer; font-size: 12px; font-weight: bold; transition: background 0.2s, color 0.2s; }
.reconnect-btn:hover { background: #e74c3c; color: #fff; }
.msg.reconnected { align-self: center; background: transparent; color: #2ecc71; font-size: 12px; font-weight: bold; }
@keyframes msg-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.msg.new-msg { animation: msg-in 0.3s ease-out; }
@keyframes glow-fade { 0% { box-shadow: 0 0 12px 4px rgba(76,217,100,0.6); } 100% { box-shadow: none; } }
.msg.glow { animation: glow-fade 1.5s ease-out; }
@keyframes flash-border { 0%,100% { border-color: transparent; } 50% { border-color: #4cd964; } }
.msg.flash { animation: flash-border 0.6s ease 2; }
#input-split-bar { height: 6px; background: #2a2a5e; cursor: row-resize; flex-shrink: 0; transition: background 0.2s; position: relative; display: flex; align-items: center; justify-content: center; }
#input-split-bar::after { content: ''; display: block; width: 24px; height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; transition: background 0.2s, width 0.2s; }
#input-split-bar:hover, #input-split-bar.dragging { background: #0f3460; }
#input-split-bar:hover::after, #input-split-bar.dragging::after { background: rgba(255,255,255,0.35); width: 36px; }
#input-area { padding: 12px 16px; background: #16213e; border-top: 1px solid #333; display: flex; gap: 8px; min-height: 60px; }
#input-area textarea { flex: 1; padding: 10px; border: 1px solid #444; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; resize: none; height: 100%; font-family: inherit; }
#input-area button { padding: 10px 20px; border: none; border-radius: 6px; background: #0f3460; color: #e0e0e0; cursor: pointer; font-size: 14px; }
#input-area button:hover { background: #1a5276; }
#input-area button:disabled { opacity: 0.5; cursor: default; }
#typing .task-count { font-weight: bold; }
#status-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #16213e; border: 1px solid #444; border-radius: 8px; padding: 20px; max-width: 700px; width: 90%; max-height: 70vh; z-index: 10; }
#status-panel h2 { font-size: 14px; margin-bottom: 12px; }
#status-panel .close { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #aaa; }
#status-table-wrap { max-height: calc(70vh - 60px); overflow-y: auto; }
#status-table-wrap::-webkit-scrollbar { width: 6px; }
#status-table-wrap::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
#status-table { width: 100%; border-collapse: collapse; font-size: 13px; }
#status-table thead th { position: sticky; top: 0; background: #0f3460; padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid #444; white-space: nowrap; }
#status-table tbody td { padding: 7px 10px; border-bottom: 1px solid #2a2a4a; vertical-align: top; }
#status-table tbody tr:hover { background: #1a2a4e; }
#status-table .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
#status-table .status-active { background: #1a3a2a; color: #4cd964; }
#status-table .status-paused { background: #3a3a1a; color: #f5c542; }
#status-table .prompt-cell { white-space: pre-wrap; word-break: break-word; }
#overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
</head>
<body>

<div id="auth">
  <h2>Nanoclaw</h2>
  <input type="password" id="token-input" placeholder="Token" onkeydown="if(event.key==='Enter')connect()" />
  <button onclick="connect()">Connect</button>
  <div class="error" id="auth-error"></div>
</div>

<div id="chat">
  <div id="header">
    <h1>Nanoclaw</h1>
    <div class="actions">
      <button id="btn-sound" onclick="toggleSound()" title="알림 사운드 on/off">🔔</button>
      <button onclick="showStatus()">Schedule</button>
      <button onclick="clearSession()">Clear</button>
      <button onclick="disconnect()">Disconnect</button>
    </div>
  </div>
  <div id="chat-wrapper">
    <div id="chat-main">
      <div id="messages"></div>
      <div id="typing"></div>
      <div id="input-split-bar"></div>
      <div id="input-area">
        <textarea id="msg-input" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
    <div id="split-bar"></div>
    <div id="sidebar">
      <h3>History</h3>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<div id="overlay" onclick="hideStatus()"></div>
<div id="status-panel">
  <span class="close" onclick="hideStatus()">X</span>
  <h2>Scheduled Tasks</h2>
  <label style="font-size:12px;color:#aaa;display:flex;align-items:center;gap:4px;margin-bottom:8px;cursor:pointer;"><input type="checkbox" id="filter-active" checked onchange="applyStatusFilter()"> Active only</label>
  <div id="status-content">Loading...</div>
</div>

<script>
let ws = null;
let pageFocused = true;
let titleTimer = null;
let lastToken = null;
let soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
const origTitle = document.title;
let msgCounter = 0;
let activeTasks = new Set(); // track in-flight msg_ids
let sentHistory = [];

window.addEventListener('focus', () => {
  pageFocused = true;
  if (titleTimer) { clearInterval(titleTimer); titleTimer = null; }
  document.title = origTitle;
});
window.addEventListener('blur', () => { pageFocused = false; });

function getHost() { return location.host || 'localhost:8765'; }

function connect() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) return;
  doConnect(token);
}

let manualDisconnect = false;
let reconnectTimer = null;
let reconnectDelay = 1000;

function doConnect(token) {
  lastToken = token;
  manualDisconnect = false;
  clearTimeout(reconnectTimer);
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${getHost()}/ws`);
  ws.onopen = () => { reconnectDelay = 1000; ws.send(JSON.stringify({type: 'auth', token})); };
  ws.onmessage = (e) => handleMsg(JSON.parse(e.data));
  ws.onclose = () => {
    activeTasks.clear();
    updateTyping();
    if (document.getElementById('chat').style.display !== 'none') {
      const existing = document.querySelector('.msg.disconnected');
      if (!existing) {
        addDisconnectedMsg();
      } else {
        const btn = existing.querySelector('.reconnect-btn');
        if (btn) btn.style.display = '';
      }
      if (!manualDisconnect && lastToken) {
        reconnectTimer = setTimeout(() => doConnect(lastToken), reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      }
    }
  };
  ws.onerror = () => document.getElementById('auth-error').textContent = 'Connection failed';
}

function addDisconnectedMsg() {
  const el = document.createElement('div');
  el.className = 'msg disconnected new-msg';
  const txt = document.createElement('span');
  txt.textContent = 'Disconnected.';
  el.appendChild(txt);
  const btn = document.createElement('button');
  btn.className = 'reconnect-btn';
  btn.textContent = 'Reconnect';
  btn.onclick = () => {
    if (lastToken) {
      btn.style.display = 'none';
      doConnect(lastToken);
    }
  };
  el.appendChild(btn);
  const msgs = document.getElementById('messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function handleMsg(data) {
  const mid = data.msg_id || '';
  switch (data.type) {
    case 'auth_ok':
      document.getElementById('auth').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      document.getElementById('msg-input').focus();
      const dcEls = document.querySelectorAll('.msg.disconnected');
      if (dcEls.length > 0) {
        dcEls.forEach(el => el.remove());
        const rc = document.createElement('div');
        rc.className = 'msg reconnected new-msg';
        rc.textContent = 'Reconnected';
        const msgs = document.getElementById('messages');
        msgs.appendChild(rc);
        msgs.scrollTop = msgs.scrollHeight;
      }
      break;
    case 'auth_fail':
      document.getElementById('auth-error').textContent = data.reason;
      break;
    case 'response':
      activeTasks.delete(mid);
      addMsg(data.text, 'bot glow', mid);
      notifyNewMsg();
      updateTyping();
      break;
    case 'push':
      addMsg(data.text, 'push glow', mid);
      notifyNewMsg();
      break;
    case 'typing':
      if (data.active) activeTasks.add(mid);
      else activeTasks.delete(mid);
      updateTyping();
      break;
    case 'status':
      renderStatus(data.data);
      break;
    case 'error':
      activeTasks.delete(mid);
      addMsg(data.text, 'error', mid);
      updateTyping();
      break;
  }
}

function updateTyping() {
  const el = document.getElementById('typing');
  const n = activeTasks.size;
  if (n === 0) el.textContent = '';
  else if (n === 1) el.textContent = 'Thinking...';
  else el.textContent = `Thinking... (${n} tasks)`;
}

function playNotifySound() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1100, t);
    osc.frequency.setValueAtTime(880, t + 0.1);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.setValueAtTime(0.3, t + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
    osc.start(t); osc.stop(t + 0.2);
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('soundEnabled', soundEnabled);
  updateSoundBtn();
}

function updateSoundBtn() {
  const btn = document.getElementById('btn-sound');
  if (btn) { btn.textContent = soundEnabled ? '🔔' : '🔕'; btn.style.opacity = soundEnabled ? '1' : '0.5'; }
}

function notifyNewMsg() {
  playNotifySound();
  if (pageFocused || titleTimer) return;
  let on = true;
  titleTimer = setInterval(() => {
    document.title = on ? '🔔 새 메시지' : origTitle;
    on = !on;
  }, 800);
}

function addMsg(text, cls, msgId) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls + ' new-msg';
  if (msgId) el.dataset.msgId = msgId;
  const txt = document.createElement('span');
  if (cls.includes('bot') || cls.includes('push')) {
    txt.innerHTML = marked.parse(text);
  } else {
    txt.textContent = text;
  }
  el.appendChild(txt);
  const now = new Date();
  const ts = document.createElement('span');
  ts.className = 'time';
  ts.textContent = now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  el.appendChild(ts);
  const msgs = document.getElementById('messages');
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !ws) return;
  const mid = 'm' + (++msgCounter);
  addMsg(text, 'user', mid);
  ws.send(JSON.stringify({type: 'message', text, msg_id: mid}));
  input.value = '';
  addToHistory(text);
}

function addToHistory(text) {
  // deduplicate: remove if already exists
  sentHistory = sentHistory.filter(t => t !== text);
  sentHistory.unshift(text);
  if (sentHistory.length > 100) sentHistory.length = 100;
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!list) return;
  list.innerHTML = '';
  sentHistory.forEach(text => {
    const el = document.createElement('div');
    el.className = 'history-item';
    el.textContent = text;
    el.title = text;
    el.onclick = () => {
      document.getElementById('msg-input').value = text;
      document.getElementById('msg-input').focus();
    };
    list.appendChild(el);
  });
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function clearSession() {
  if (activeTasks.size > 0 && !confirm('작업이 진행 중입니다. 중단하고 초기화할까요?')) return;
  if (ws) ws.send(JSON.stringify({type: 'clear'}));
  document.getElementById('messages').innerHTML = '';
  activeTasks.clear();
  sentHistory = [];
  renderHistory();
  updateTyping();
}

function showStatus() {
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('status-panel').style.display = 'block';
  document.getElementById('status-content').textContent = 'Loading...';
  if (ws) ws.send(JSON.stringify({type: 'status'}));
}

function hideStatus() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('status-panel').style.display = 'none';
}

let lastStatusTasks = [];

function applyStatusFilter() {
  renderStatus(lastStatusTasks);
}

function renderStatus(tasks) {
  lastStatusTasks = tasks;
  const el = document.getElementById('status-content');
  const activeOnly = document.getElementById('filter-active').checked;
  const filtered = activeOnly ? tasks.filter(t => t.status === 'active') : tasks;
  if (!filtered.length) { el.textContent = activeOnly ? 'No active tasks.' : 'No scheduled tasks.'; return; }
  const statusBadge = (s) => {
    const cls = s === 'active' ? 'status-active' : 'status-paused';
    return `<span class="status-badge ${cls}">${s}</span>`;
  };
  el.innerHTML = `<div id="status-table-wrap"><table id="status-table">
    <thead><tr><th>ID</th><th>Status</th><th>Type</th><th>Schedule</th><th>Prompt</th></tr></thead>
    <tbody>${filtered.map(t => `<tr>
      <td>${t.id}</td>
      <td>${statusBadge(t.status)}</td>
      <td>${t.schedule_type}</td>
      <td>${t.schedule_value}</td>
      <td class="prompt-cell" title="${(t.prompt||'').replace(/"/g,'&quot;')}">${t.prompt}</td>
    </tr>`).join('')}</tbody></table></div>`;
}

function disconnect() {
  if (!confirm('연결을 끊을까요?')) return;
  manualDisconnect = true;
  clearTimeout(reconnectTimer);
  if (ws) ws.close();
  document.getElementById('token-input').value = '';
  document.getElementById('chat').style.display = 'none';
  document.getElementById('auth').style.display = 'flex';
}

// Split bar drag
(function() {
  const bar = document.getElementById('split-bar');
  let dragging = false;
  bar.addEventListener('dblclick', () => {
    const wrapper = document.getElementById('chat-wrapper');
    const rect = wrapper.getBoundingClientRect();
    const half = rect.width / 2;
    document.getElementById('chat-main').style.flex = 'none';
    document.getElementById('chat-main').style.width = half + 'px';
    document.getElementById('sidebar').style.flex = '1';
  });
  bar.addEventListener('mousedown', (e) => {
    dragging = true;
    bar.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const wrapper = document.getElementById('chat-wrapper');
    const rect = wrapper.getBoundingClientRect();
    const chatWidth = Math.max(280, Math.min(e.clientX - rect.left, rect.width - 5));
    document.getElementById('chat-main').style.flex = 'none';
    document.getElementById('chat-main').style.width = chatWidth + 'px';
    document.getElementById('sidebar').style.flex = '1';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    bar.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// Input area split bar drag
(function() {
  const bar = document.getElementById('input-split-bar');
  const inputArea = document.getElementById('input-area');
  let dragging = false;
  bar.addEventListener('mousedown', (e) => {
    dragging = true;
    bar.classList.add('dragging');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const chatMain = document.getElementById('chat-main');
    const rect = chatMain.getBoundingClientRect();
    const inputHeight = Math.max(60, Math.min(rect.bottom - e.clientY, rect.height * 0.6));
    inputArea.style.height = inputHeight + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    bar.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

window.addEventListener('beforeunload', function(e) {
  e.preventDefault(); e.returnValue = '';
});

updateSoundBtn();
renderHistory();

</script>
</body>
</html>
